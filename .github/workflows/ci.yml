name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix app

      - name: Build
        run: npm run build

      - name: Build app
        run: npm run build --prefix app

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test app (Vitest — settings/IPC)
        run: npm test --prefix app

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python audio-engine tests (stream.py + playback.py)
        # sounddevice is stubbed by the tests, so PortAudio isn't needed here.
        # numpy + scipy cover the analysis helpers; soundfile is needed so the
        # session-recording/playback + SIGTERM stem tests run rather than skip.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile
          python packages/audio-engine/scripts/test_stream.py
          python packages/audio-engine/scripts/test_playback.py
