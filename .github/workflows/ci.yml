name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Locked brand phrase must be verbatim across surfaces (#80). No deps —
      # fail fast on copy drift before the heavier install/build steps.
      - name: Positioning check
        run: node scripts/check-positioning.mjs

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix app

      # The Electron app shells into the nested Vite renderer package during
      # `npm run build --prefix app`; install its lockfile too so app builds in
      # CI mirror local `scripts/verify.sh`.
      - name: Install renderer dependencies
        run: npm ci --prefix app/renderer

      # Media tools + Python analysis deps must be present BEFORE the Vitest
      # steps: the fixture parser tests (#150) shell out to sox/ffprobe and the
      # spectrum + drift-guard tests run spectrum.py via librosa. Without these
      # the tests skip; with them they execute and assert real numbers in CI.
      # librosa is pinned so the fixture band values stay stable across runs.
      - name: Install media + Python analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sox ffmpeg
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile "librosa==0.11.0"

      - name: Build
        run: npm run build

      # The aggregated coverage run (`npm test` below) includes the worker
      # project only when its deps are installed; its coverage:deps preflight
      # installs them best-effort and skips worker on failure. Install them
      # explicitly here so worker's inclusion in the merged report is
      # deterministic in CI, not subject to a silent skip. Must run after
      # Build: worker's `file:` dep on @sound-buddy/license-policy needs its
      # dist/ to exist at install time.
      - name: Install worker dependencies
        run: npm ci --prefix worker

      - name: Build app
        run: npm run build --prefix app

      - name: Lint
        run: npm run lint

      # `npm test` is the root aggregated coverage run (#438): a vitest
      # projects run over packages/* + app + worker that writes one merged
      # report (incl. Cobertura XML) to ./coverage — the artifact external
      # repo scanners read when judging test posture. Ungated: no thresholds;
      # the ratchet gate is the "Test coverage (gated)" step below.
      - name: Test (aggregated coverage)
        run: npm test

      - name: Test app (Vitest — settings/IPC + parser drift guard)
        run: npm test --prefix app

      # Coverage is GATED: thresholds live in each vitest.config.ts as a
      # ratchet a couple points below the current baseline, so this step fails
      # the build if coverage drops below the floor. The upload still runs on
      # failure (`if: always()`) so the HTML report is downloadable to inspect
      # what regressed. Raise the floors in the configs as coverage grows.
      # Re-runs the same suites as the Test steps above with per-package
      # --coverage; the redundancy is intentional so a clean test pass and the
      # coverage gate stay independent signals. (This fan-out lived in a root
      # `test:coverage` script until #438 made `test` itself a coverage run;
      # both halves run even if the first fails so every report uploads.)
      - name: Test coverage (gated)
        run: |
          s=0
          npm run test:coverage --workspaces --if-present || s=1
          npm run test:coverage --prefix app || s=1
          exit $s

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
            packages/*/coverage/
            app/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Python audio-engine tests (stream.py + playback.py)
        # sounddevice is stubbed by the tests, so PortAudio isn't needed here.
        # numpy + scipy + soundfile were installed above alongside librosa.
        run: |
          python packages/audio-engine/scripts/test_stream.py
          python packages/audio-engine/scripts/test_playback.py

  # Electron e2e (#402, TD-008): the stubbed Playwright specs validate the real
  # product shell (report card, live capture, entitlement/licensing gating).
  # They stub the analyze-file/list-devices/start-live IPC, so no
  # sox/ffprobe/python is needed — the specs that drive a real analysis
  # (smoke/packaged/packaged-onboarding/onboarding, see MEDIA_SPECS in
  # playwright.config.ts) are excluded via SB_E2E_STUBBED_ONLY and run only in
  # scripts/verify.sh locally. Electron needs a display on Linux, hence xvfb.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Electron runtime libraries + a virtual framebuffer. libasound is
      # libasound2t64 on ubuntu-24.04 (ubuntu-latest); the extra libs cover
      # Chromium's sandbox/GBM/GTK deps that aren't preinstalled.
      - name: Install Electron runtime libraries + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libgbm1 libgtk-3-0 libasound2t64

      - name: Install workspace dependencies
        run: npm ci

      # The Electron main process imports built workspace packages
      # (@sound-buddy/shared etc.); build them before the app build (CI order
      # mirrors scripts/verify.sh).
      - name: Build workspace packages
        run: npm run build

      - name: Install app dependencies
        run: npm ci --prefix app

      - name: Install renderer dependencies
        run: npm ci --prefix app/renderer

      - name: Build app (renderer + electron main -> dist/electron)
        run: npm run build --prefix app

      - name: Run stubbed Electron e2e (Playwright under xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e:stubbed --prefix app

  # The landing site (site/) is a standalone Astro package, not an npm
  # workspace, so it builds independently: astro check → build → internal-link
  # smoke (guards the footer legal links and download URL) → mobile-overflow
  # browser check (#495, guards horizontal scroll at 320/360/390px viewports).
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify (check + build + link smoke)
        run: npm run verify

  # The Stripe / licensing API Worker (worker/, #107) is a standalone package
  # like site/ — not an npm workspace and not coupled to the app/ or site/
  # builds. It verifies independently: tsc typecheck → vitest routing tests.
  # One cross-package dependency as of TD-006 (#400): @sound-buddy/license-policy
  # via a `file:` dependency on its ESM dist/, built from the repo root below
  # before this job's own `npm ci` resolves it.
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      # @sound-buddy/license-policy (TD-006, #400) is consumed via a `file:`
      # dependency on its ESM dist/ (gitignored, not committed) — build it
      # from the repo root before `npm ci` here, or the file: install ships a
      # dist-less package and every import in license-sign.ts fails to resolve.
      - name: Build @sound-buddy/license-policy
        working-directory: ${{ github.workspace }}
        run: |
          npm ci
          npm run build -w @sound-buddy/license-policy

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + tests)
        run: npm run verify

      # Coverage is GATED: thresholds live in vitest.config.ts as a ratchet a
      # few points below the current baseline, so this step fails the build if
      # coverage drops below the floor. Re-runs the same suite as the Verify
      # step above with --coverage; the redundancy mirrors the root workflow's
      # test / gated-coverage split, keeping a clean pass and the coverage
      # gate as independent signals.
      - name: Test coverage (gated)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-worker
          path: worker/coverage/
          if-no-files-found: ignore
          retention-days: 14

  # Secret scanning (#221) — nothing else in this workflow catches a real
  # committed credential before it reaches main. Installs the gitleaks binary
  # directly rather than the `gitleaks/gitleaks-action` wrapper, which
  # requires a GITLEAKS_LICENSE for organization-owned repos; the OSS binary
  # itself is free and needs no license. Pinned to a specific version (with a
  # checksum check) for deterministic, reproducible results across runs.
  # `.gitleaks.toml` at the repo root extends gitleaks' default ruleset and
  # allowlists known fake test-fixture placeholders by literal value — see
  # that file for what's excluded and why.
  #
  # NOTE: this job isn't yet wired into a required-status-checks branch
  # protection ruleset — the repo's ruleset/branch-protection API is gated
  # behind a GitHub plan upgrade (403 "Upgrade to GitHub Pro or make this
  # repository public"), so it can't be configured from here. Follow-up once
  # that access is available.
  #
  # Keep the `gitleaks detect` invocation below in sync with the one in
  # scripts/verify.sh (same flags, same config) so local and CI results match.
  secrets:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.1'
      GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Scan for secrets
        run: ./gitleaks detect --source . --no-git --config .gitleaks.toml --redact -v
