name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Locked brand phrase must be verbatim across surfaces (#80). No deps —
      # fail fast on copy drift before the heavier install/build steps.
      - name: Positioning check
        run: node scripts/check-positioning.mjs

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix app

      # Media tools + Python analysis deps must be present BEFORE the Vitest
      # steps: the fixture parser tests (#150) shell out to sox/ffprobe and the
      # spectrum + drift-guard tests run spectrum.py via librosa. Without these
      # the tests skip; with them they execute and assert real numbers in CI.
      # librosa is pinned so the fixture band values stay stable across runs.
      - name: Install media + Python analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sox ffmpeg
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile "librosa==0.11.0"

      - name: Build
        run: npm run build

      - name: Build app
        run: npm run build --prefix app

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test app (Vitest — settings/IPC + parser drift guard)
        run: npm test --prefix app

      # Coverage is GATED: thresholds live in each vitest.config.ts as a
      # ratchet a couple points below the current baseline, so this step fails
      # the build if coverage drops below the floor. The upload still runs on
      # failure (`if: always()`) so the HTML report is downloadable to inspect
      # what regressed. Raise the floors in the configs as coverage grows.
      # Re-runs the same suites as the Test steps above with --coverage; the
      # redundancy is intentional so a clean test pass and the coverage gate
      # stay independent signals.
      - name: Test coverage (gated)
        run: npm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            packages/*/coverage/
            app/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Python audio-engine tests (stream.py + playback.py)
        # sounddevice is stubbed by the tests, so PortAudio isn't needed here.
        # numpy + scipy + soundfile were installed above alongside librosa.
        run: |
          python packages/audio-engine/scripts/test_stream.py
          python packages/audio-engine/scripts/test_playback.py

  # The landing site (site/) is a standalone Astro package, not an npm
  # workspace, so it builds independently: astro check → build → internal-link
  # smoke (guards the footer legal links and download URL).
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify (check + build + link smoke)
        run: npm run verify

  # The Stripe / licensing API Worker (worker/, #107) is a standalone package
  # like site/ — not an npm workspace and not coupled to the app/ or site/
  # builds. It verifies independently: tsc typecheck → vitest routing tests.
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + tests)
        run: npm run verify
