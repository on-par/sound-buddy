name: Deploy landing page

# Builds the Astro landing page (site/) and publishes to Cloudflare Pages on
# every push to main. PRs run a build-only check so broken markup doesn't land.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a Pages-scoped API token (Cloudflare → My Profile →
#                            API Tokens → "Edit Cloudflare Pages" template)
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID (dashboard right sidebar)
# Create the Pages project once in the Cloudflare dashboard (e.g. "sound-buddy")
# before the first run, or let pages-action create it on first deploy.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify (links + smoke)
        run: npm run verify

      - name: Upload build
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site/dist

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sound-buddy
          directory: site/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main