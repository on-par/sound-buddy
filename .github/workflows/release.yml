name: Release

# Publishes a macOS (Apple Silicon) build to GitHub Releases whenever a
# v* tag is pushed. The release asset is a plain .zip of the .app — download,
# unzip, and drag Sound Buddy.app to /Applications. macOS 26 (Tahoe) or newer.
on:
  push:
    tags:
      - 'v*'
  # Allow building a release on demand from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # macos-14 runners are Apple Silicon (arm64 / M1+), matching the build target.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build-time tools the afterPack hook bundles into the .app.
      - name: Install bundling tools (sox, ffmpeg, dylibbundler)
        run: brew install sox ffmpeg dylibbundler

      - name: Install workspace dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix app

      - name: Build workspaces
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build macOS zip
        run: npm run dist --prefix app

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/release/*-arm64-mac.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
