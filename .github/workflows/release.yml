name: Release

# Builds the macOS (Apple Silicon) .app on a v* tag and publishes it to the
# PUBLIC download repo (on-par/sound-buddy-releases) so this source repo can stay
# private. The build always uploads a workflow artifact; publishing to the public
# repo needs a RELEASES_TOKEN secret (a fine-grained PAT with contents:write on
# on-par/sound-buddy-releases). Without that secret the build still runs and the
# zip can be grabbed from the run's artifacts / published manually.
on:
  push:
    tags:
      - 'v*'
  # Allow building on demand from the Actions tab.
  workflow_dispatch:

env:
  RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}

jobs:
  release:
    # macos-14 runners are Apple Silicon (arm64 / M1+), matching the build target.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build-time tools the afterPack hook bundles into the .app.
      - name: Install bundling tools (sox, ffmpeg, dylibbundler)
        run: brew install sox ffmpeg dylibbundler

      - name: Install workspace dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix app

      - name: Build workspaces
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build macOS zip
        run: npm run dist --prefix app

      # Always available from the run, even when no publish token is configured.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sound-buddy-macos-arm64
          path: app/release/*-arm64-mac.zip

      - name: Publish to public releases repo
        if: ${{ env.RELEASES_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: on-par/sound-buddy-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            app/release/*-arm64-mac.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
