# Gitleaks secret-scanning config (#221).
#
# Extends gitleaks' built-in default ruleset (`[extend] useDefault = true`)
# rather than replacing it, so new upstream rules keep applying automatically.
#
# The literal-value allowlists below cover known, non-functional placeholder
# values already committed as test fixtures. Add a new literal entry here only
# for a specific fixture literal that's a confirmed false positive; do not
# widen these to prefix/wildcard patterns.
#
# The one `paths` allowlist below is a narrowly-scoped exclude for the
# untracked, gitignored app/test-results/ directory generated by local
# Playwright e2e runs. It is never committed, so it cannot hide a real
# committed secret; a real credential accidentally committed anywhere else,
# including inside a test file, still fails the scan.
title = "sound-buddy gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Fake Stripe/Resend credentials used to satisfy the worker Env type in tests (see makeEnv() in worker/test/delivery.test.ts and its siblings). Not live keys — no rotation needed."
regexes = [
  '''re_test_unused''',
  '''sk_test_unused''',
  '''whsec_unused''',
]

[[allowlists]]
description = "Fake minted license-key literal used in a worker delivery test scenario (worker/test/delivery.test.ts). Real SB1. license keys are base64url payload+signature triples; this is a plain English placeholder, not key material."
regexes = [
  '''SB1\.throw\.key''',
]

[[allowlists]]
description = "The gitignored app/test-results/ directory holds fake license keys / user-data generated by the Playwright e2e suite (app/tests/*.spec.ts, app/tests/e2e/e2e-helpers.ts). It is never committed (.gitignore: test-results/), so a full local verify.sh run right after e2e must not fail on it. This is a path exclude, not a literal-value allowlist, and is safe precisely because the path is untracked; a real secret in a *tracked* file anywhere still fails the scan. CI is unaffected — its runner never has this directory."
paths = [
  '''^app/test-results/''',
]
