# Gitleaks secret-scanning config (#221).
#
# Extends gitleaks' built-in default ruleset (`[extend] useDefault = true`)
# rather than replacing it, so new upstream rules keep applying automatically.
#
# The literal-value allowlists below cover known, non-functional placeholder
# values already committed as test fixtures. Add a new literal entry here only
# for a specific fixture literal that's a confirmed false positive; do not
# widen these to prefix/wildcard patterns.
#
# A `paths` allowlist is a different kind of entry: a narrowly-scoped
# directory exclude rather than a literal-value match. Use it only for a
# directory that's untracked and gitignored (so it can never hide a real
# committed secret) — a real credential committed anywhere else, including
# inside a test file, still fails the scan.
title = "sound-buddy gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Fake Stripe/Resend credentials used to satisfy the worker Env type in tests (see makeEnv() in worker/test/delivery.test.ts and its siblings). Not live keys — no rotation needed."
regexes = [
  '''re_test_unused''',
  '''sk_test_unused''',
  '''whsec_unused''',
]

[[allowlists]]
description = "Fake minted license-key literals used in worker delivery test scenarios (worker/src/delivery.test.ts). Real SB1. license keys are base64url payload+signature triples; these are plain English placeholders, not key material."
regexes = [
  '''SB1\.throw\.key''',
  '''SB1\.no\.expiry''',
]

[[allowlists]]
description = "Path exclude (see file header) for the gitignored app/test-results/ directory: fake license keys / user-data generated by the Playwright e2e suite (app/tests/*.spec.ts, app/tests/e2e/e2e-helpers.ts). Never committed (.gitignore: test-results/), so a full local verify.sh run right after e2e must not fail on it. CI is unaffected — its runner never has this directory."
paths = [
  '''^app/test-results/''',
]
