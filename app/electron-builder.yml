appId: com.soundbuddy.app
productName: Sound Buddy
directories:
  output: release
# Makes the packaged .app fully self-contained: bundles sox, ffprobe (+ dylibs)
# and a relocatable Python with the audio deps, so it runs with no Homebrew /
# system python. Requires sox, ffmpeg, dylibbundler on the build machine.
afterPack: build/afterPack.js
# Only ship the compiled app + the built renderer bundle. node_modules is
# dev-only (electron itself is provided by the builder), so it's excluded
# automatically. The renderer is a Vite single-file build (#303) — only
# renderer/dist ships; renderer/src, renderer/node_modules, and the renderer
# build config/tooling never do.
files:
  - dist/**/*
  - renderer/dist/**/*
  - package.json
  # package.json declares "SEE LICENSE IN LICENSE" — the file must ship with it.
  - LICENSE
  # #396 declares @sound-buddy/audio-engine as a file: dependency for static
  # visibility only — the runtime engine ships via extraResources (engine/)
  # and the app must keep shipping zero node_modules. Excluded explicitly so
  # electron-builder's automatic production-dependency collection (triggered
  # by the new "dependencies" section in package.json) can't pull the
  # symlinked package tree into the bundle.
  - "!node_modules/**"
asar: true
# The Python analysis scripts must live OUTSIDE the asar archive — an external
# `python3` process can't read files inside app.asar. They land at
# Contents/Resources/scripts, which ipc.ts resolves via process.resourcesPath.
extraResources:
  - from: ../packages/audio-engine/scripts
    to: scripts
    filter:
      - "**/*"
  # Compiled CommonJS build of the audio-engine parsers (#151) — the app's
  # single source of analysis parsing. Loaded at runtime by
  # electron/ipc/engine-loader.ts from Contents/Resources/engine.
  - from: ../packages/audio-engine/dist-cjs
    to: engine
    filter:
      - "**/*"
  # Compiled CommonJS build of the isomorphic license policy (TD-006, #400) —
  # loaded at runtime by electron/license-policy-loader.ts from
  # Contents/Resources/license-policy.
  - from: ../packages/license-policy/dist-cjs
    to: license-policy
    filter:
      - "**/*"
  # First-run onboarding demo recording (#69). Ships outside the asar so the
  # external sox/ffprobe processes can read it (same rationale as scripts).
  - from: assets
    to: assets
    filter:
      - "**/*"
mac:
  # Ship a plain .zip of the .app — this is what lands on the GitHub release and
  # is the intended download. Apple Silicon (M1+) only; universal/x64 not built.
  target:
    - target: zip
      arch: arm64
  category: public.app-category.music
  # macOS 26 (Tahoe) or newer. Written to Info.plist as LSMinimumSystemVersion.
  minimumSystemVersion: "26.0"
  # Required for Core Audio microphone capture on the Live tab. Without this key
  # macOS silently denies input access (and won't show the permission prompt),
  # so attached microphones never appear / can't be recorded.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Sound Buddy needs microphone access to capture and analyze live audio
      from your input device.
  # Unsigned by default; release.sh overrides this on the CLI when
  # SOUND_BUDDY_SIGNING_IDENTITY / SOUND_BUDDY_NOTARY_PROFILE are set — see
  # docs/signing-and-notarization.md. Unsigned builds still block first launch
  # on Gatekeeper; open System Settings → Privacy & Security and click "Open
  # Anyway" in the Security section (or
  # `xattr -dr com.apple.quarantine "/Applications/Sound Buddy.app"`).
  identity: null
  # Hardened runtime + entitlements are required for notarization (#53). They
  # are inert for unsigned dev/CI builds (identity: null skips the sign step);
  # release.sh activates real signing by overriding identity on the CLI
  # (-c.mac.identity) when SOUND_BUDDY_SIGNING_IDENTITY is set.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
