appId: com.soundbuddy.app
productName: Sound Buddy
directories:
  output: release
# Only ship the compiled app + the static renderer. node_modules is dev-only
# (electron itself is provided by the builder), so it's excluded automatically.
files:
  - dist/**/*
  - renderer/**/*
  - package.json
asar: true
# The Python analysis scripts must live OUTSIDE the asar archive — an external
# `python3` process can't read files inside app.asar. They land at
# Contents/Resources/scripts, which ipc.ts resolves via process.resourcesPath.
extraResources:
  - from: ../packages/audio-engine/scripts
    to: scripts
    filter:
      - "**/*"
mac:
  # Ship a plain .zip of the .app — this is what lands on the GitHub release and
  # is the intended download. Apple Silicon (M1+) only; universal/x64 not built.
  target:
    - target: zip
      arch: arm64
  category: public.app-category.music
  # macOS 26 (Tahoe) or newer. Written to Info.plist as LSMinimumSystemVersion.
  minimumSystemVersion: "26.0"
  # Required for Core Audio microphone capture on the Live tab. Without this key
  # macOS silently denies input access (and won't show the permission prompt),
  # so attached microphones never appear / can't be recorded.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Sound Buddy needs microphone access to capture and analyze live audio
      from your input device.
  # Unsigned — no Apple Developer ID required. Gatekeeper shows an
  # "unidentified developer" warning on first launch; right-click → Open once
  # (or `xattr -dr com.apple.quarantine "/Applications/Sound Buddy.app"`).
  identity: null
