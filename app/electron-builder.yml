appId: com.soundbuddy.app
productName: Sound Buddy
directories:
  output: release
# Makes the packaged .app fully self-contained: bundles sox, ffprobe (+ dylibs)
# and a relocatable Python with the audio deps, so it runs with no Homebrew /
# system python. Requires sox, ffmpeg, dylibbundler on the build machine.
afterPack: build/afterPack.js
# electron-builder 24 notarizes + staples only the .app (macPackager's
# notarizeIfProvided() runs inside the sign phase, before any target is
# built), so the DMG built afterwards contains a stapled app but carries no
# ticket of its own. This hook submits + staples the DMG separately, once all
# artifacts are built (see mac.notarize above and dmg: below).
afterAllArtifactBuild: build/afterAllArtifactBuild.js
# Only ship the compiled app + the built renderer bundle. node_modules is
# dev-only (electron itself is provided by the builder), so it's excluded
# automatically. The renderer is a Vite single-file build (#303) — only
# renderer/dist ships; renderer/src, renderer/node_modules, and the renderer
# build config/tooling never do.
files:
  - dist/**/*
  - renderer/dist/**/*
  - package.json
  # package.json declares "SEE LICENSE IN LICENSE" — the file must ship with it.
  - LICENSE
  # #396 declares @sound-buddy/audio-engine as a file: dependency for static
  # visibility only — the runtime engine ships via extraResources (engine/)
  # and the app must keep shipping zero node_modules. Excluded explicitly so
  # electron-builder's automatic production-dependency collection (triggered
  # by the new "dependencies" section in package.json) can't pull the
  # symlinked package tree into the bundle.
  - "!node_modules/**"
asar: true
# The Python analysis scripts must live OUTSIDE the asar archive — an external
# `python3` process can't read files inside app.asar. They land at
# Contents/Resources/scripts, which ipc.ts resolves via process.resourcesPath.
extraResources:
  - from: ../packages/audio-engine/scripts
    to: scripts
    filter:
      - "**/*"
  # Compiled CommonJS build of the audio-engine parsers (#151) — the app's
  # single source of analysis parsing. Loaded at runtime by
  # electron/ipc/engine-loader.ts from Contents/Resources/engine.
  - from: ../packages/audio-engine/dist-cjs
    to: engine
    filter:
      - "**/*"
  # Compiled CommonJS build of the isomorphic license policy (TD-006, #400) —
  # loaded at runtime by electron/license-policy-loader.ts from
  # Contents/Resources/license-policy.
  - from: ../packages/license-policy/dist-cjs
    to: license-policy
    filter:
      - "**/*"
  # Compiled CommonJS build of the scene-inspector M32R .scn parser/diff (#264)
  # — the package ships ESM-only, so the app's CommonJS main process loads
  # this build at runtime via electron/scene-inspector-loader.ts from
  # Contents/Resources/scene-inspector, mirroring engine/ and license-policy/.
  - from: ../packages/scene-inspector/dist-cjs
    to: scene-inspector
    filter:
      - "**/*"
  # First-run onboarding demo recording (#69). Ships outside the asar so the
  # external sox/ffprobe processes can read it (same rationale as scripts).
  - from: assets
    to: assets
    filter:
      - "**/*"
mac:
  # Ship a plain .zip of the .app — this is what lands on the GitHub release and
  # is the intended download. Apple Silicon (M1+) only; universal/x64 not built.
  target:
    - target: zip
      arch: arm64
    - target: dmg
      arch: arm64
  category: public.app-category.music
  # macOS 26 (Tahoe) or newer. Written to Info.plist as LSMinimumSystemVersion.
  minimumSystemVersion: "26.0"
  # Required for Core Audio microphone capture on the Live tab. Without this key
  # macOS silently denies input access (and won't show the permission prompt),
  # so attached microphones never appear / can't be recorded.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Sound Buddy needs microphone access to capture and analyze live audio
      from your input device.
  # Unsigned by default; release.sh (local) and .github/workflows/release.yml (CI)
  # both override this on the CLI when SOUND_BUDDY_SIGNING_IDENTITY is set — see
  # docs/signing-and-notarization.md. Unsigned builds still block first launch
  # on Gatekeeper; open System Settings → Privacy & Security and click "Open
  # Anyway" in the Security section (or
  # `xattr -dr com.apple.quarantine "/Applications/Sound Buddy.app"`).
  identity: null
  # Notarization + stapling are performed natively by electron-builder (#621):
  # it submits to Apple inside its sign phase, staples the returned ticket to the
  # .app, and only then builds the zip target — so the shipped zip always contains
  # a stapled app (no post-hoc staple + re-zip dance). Off by default so unsigned
  # dev/CI builds never touch the notary service; release.sh (local, via
  # APPLE_KEYCHAIN_PROFILE) and .github/workflows/release.yml (CI, via
  # APPLE_ID/APPLE_TEAM_ID/APPLE_APP_SPECIFIC_PASSWORD — a fresh runner has no
  # stored notarytool profile) both turn it on with -c.mac.notarize=true, exactly
  # mirroring how they override `identity` above.
  notarize: false
  # Hardened runtime + entitlements are required for notarization (#53). They
  # are inert for unsigned dev/CI builds (identity: null skips the sign step);
  # release.sh activates real signing by overriding identity on the CLI
  # (-c.mac.identity) when SOUND_BUDDY_SIGNING_IDENTITY is set.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # #620 — electron-builder's sign phase walks every file in the bundle and
  # runs one `codesign` per file. Under Contents/Resources that is thousands of
  # .py/.pyc/.json/.txt files that are NOT Mach-O: they carry no signature of
  # their own and are already covered by the outer bundle seal, so signing them
  # individually turned a release build into ~45 minutes. afterPack.js has
  # already signed every genuine nested Mach-O under bin/, lib/ and python/
  # with `--options runtime --timestamp`, so skipping these trees here removes
  # the duplicate walk without leaving any binary unsigned. These are regexes
  # matched against the full file path; nothing under Contents/MacOS,
  # Contents/Frameworks, or app.asar is listed, so the app, its helpers and the
  # Electron frameworks are still signed normally.
  signIgnore:
    - "Contents/Resources/python/"
    - "Contents/Resources/bin/"
    - "Contents/Resources/lib/"
    - "Contents/Resources/scripts/"
    - "Contents/Resources/engine/"
    - "Contents/Resources/license-policy/"
    - "Contents/Resources/scene-inspector/"
    - "Contents/Resources/assets/"
dmg:
  # Sign the .dmg with the same Developer ID. dmg-builder skips this cleanly
  # when mac.identity is null (unsigned dev/CI builds), so it is safe to leave on.
  sign: true
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications
  # The afterAllArtifactBuild hook staples the notarization ticket to the .dmg
  # AFTER dmg-builder writes it, which would invalidate a blockmap computed
  # beforehand. Nothing consumes dmg differential updates (the updater is
  # zip-based and check-only), so don't emit one.
  writeUpdateInfo: false
